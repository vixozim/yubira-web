<svg viewBox="0 0 460 400" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- Fondo -->
  <rect width="460" height="400" rx="24" fill="#FDE8EE"/>
  <!-- Sombra piso -->
  <ellipse cx="230" cy="345" rx="170" ry="20" fill="#F5C0CC" opacity="0.45"/>
  <!-- Casa cuerpo -->
  <rect x="100" y="180" width="260" height="160" rx="10" fill="#FFFFFF"/>
  <!-- Sombra lateral -->
  <rect x="340" y="195" width="20" height="145" rx="5" fill="#F0C8D4" opacity="0.55"/>
  <!-- Techo -->
  <polygon points="80,185 230,80 380,185" fill="#B8A8D8"/>
  <polygon points="230,80 380,185 370,185 230,92" fill="#A090C4"/>
  <!-- Chimenea -->
  <rect x="280" y="95" width="28" height="50" rx="4" fill="#A090C4"/>
  <rect x="275" y="88" width="38" height="14" rx="4" fill="#B8A8D8"/>
  <!-- Humo -->
  <circle cx="294" cy="72" r="10" fill="white" opacity="0.5"/>
  <circle cx="304" cy="58" r="8" fill="white" opacity="0.35"/>
  <circle cx="296" cy="46" r="6" fill="white" opacity="0.2"/>
  <!-- Ventana izq -->
  <rect x="125" y="210" width="72" height="62" rx="8" fill="#EDE8F7"/>
  <rect x="125" y="210" width="72" height="62" rx="8" fill="none" stroke="#B8A8D8" stroke-width="2.5"/>
  <line x1="161" y1="210" x2="161" y2="272" stroke="#B8A8D8" stroke-width="2"/>
  <line x1="125" y1="241" x2="197" y2="241" stroke="#B8A8D8" stroke-width="2"/>
  <!-- Ventana der -->
  <rect x="263" y="210" width="72" height="62" rx="8" fill="#EDE8F7"/>
  <rect x="263" y="210" width="72" height="62" rx="8" fill="none" stroke="#B8A8D8" stroke-width="2.5"/>
  <line x1="299" y1="210" x2="299" y2="272" stroke="#B8A8D8" stroke-width="2"/>
  <line x1="263" y1="241" x2="335" y2="241" stroke="#B8A8D8" stroke-width="2"/>
  <!-- Puerta -->
  <rect x="193" y="256" width="74" height="84" rx="8" fill="#F5D980"/>
  <rect x="193" y="256" width="74" height="84" rx="8" fill="none" stroke="#E8C840" stroke-width="2"/>
  <circle cx="253" cy="298" r="5" fill="#E07080"/>
  <!-- Llave inglesa flotante -->
  <g transform="translate(400,90) rotate(-35)">
    <rect x="-8" y="-44" width="16" height="62" rx="7" fill="#F0A0B0"/>
    <rect x="-14" y="-56" width="28" height="18" rx="5" fill="#F0A0B0"/>
    <rect x="-6" y="-56" width="12" height="18" rx="3" fill="#E07080"/>
    <rect x="-4" y="-50" width="4" height="30" rx="2" fill="white" opacity="0.3"/>
  </g>
  <!-- Destornillador flotante -->
  <g transform="translate(55,120) rotate(30)">
    <rect x="-5" y="-48" width="10" height="64" rx="4" fill="#B8A8D8"/>
    <polygon points="-8,-48 8,-48 5,-62 -5,-62" fill="#A090C4"/>
    <rect x="-5" y="16" width="10" height="12" rx="2" fill="#F0A0B0"/>
    <rect x="-2" y="-44" width="4" height="36" rx="2" fill="white" opacity="0.25"/>
  </g>
  <!-- Cinta métrica -->
  <g transform="translate(390,320)">
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="#F5D980"/>
    <rect x="-22" y="-22" width="44" height="44" rx="10" fill="none" stroke="#E8C840" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="white" opacity="0.6"/>
    <path d="M-8,0 Q0,-12 8,0" stroke="#E8C840" stroke-width="2" fill="none"/>
  </g>
  <!-- Pincel -->
  <g transform="translate(55,290) rotate(-20)">
    <rect x="-4" y="-38" width="8" height="52" rx="3" fill="#F5D980"/>
    <rect x="-6" y="-50" width="12" height="16" rx="2" fill="#F0A0B0"/>
    <polygon points="-4,14 4,14 2,26 -2,26" fill="#B8A8D8"/>
  </g>
</svg>
